spring:
  application:
    name: manus-api

  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:${MANUS_LLM_API_KEY:}}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:${MANUS_LLM_BASE_URL:https://api.deepseek.com}}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_MODEL:${MANUS_LLM_MODEL_NAME:deepseek-chat}}
          temperature: ${SPRING_AI_OPENAI_TEMPERATURE:${MANUS_LLM_TEMPERATURE:0.7}}
          max-tokens: ${SPRING_AI_OPENAI_MAX_TOKENS:${MANUS_LLM_MAX_TOKENS:8192}}

  # ==================== 数据库配置 ====================
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/manus}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 20

  # ==================== Redis 配置 ====================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8


# ==================== 服务端口（对应 Python 8000） ====================
server:
  port: ${SERVER_PORT:8000}

# ==================== 应用自定义配置 ====================
manus:
  llm:
    base-url: ${MANUS_LLM_BASE_URL:${SPRING_AI_OPENAI_BASE_URL:https://api.deepseek.com}}
    api-key: ${MANUS_LLM_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}
    model-name: ${MANUS_LLM_MODEL_NAME:${SPRING_AI_OPENAI_CHAT_MODEL:deepseek-chat}}
    temperature: ${MANUS_LLM_TEMPERATURE:${SPRING_AI_OPENAI_TEMPERATURE:0.7}}
    max-tokens: ${MANUS_LLM_MAX_TOKENS:${SPRING_AI_OPENAI_MAX_TOKENS:8192}}

  # 沙箱配置
  sandbox:
    address: ${SANDBOX_ADDRESS:${SANDBOX_URL:http://localhost:8081}}
    image: ${SANDBOX_IMAGE:mooc-manus-sandbox:latest}
    name-prefix: mooc-manus-sandbox
    ttl-minutes: ${SANDBOX_TTL_MINUTES:60}
    network: ${SANDBOX_NETWORK:bridge}
    chrome-args: ${CHROME_ARGS:}
    https-proxy: ${HTTPS_PROXY:}
    http-proxy: ${HTTP_PROXY:}
    no-proxy: ${NO_PROXY:}
  # 腾讯云COS配置
  cos:
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-guangzhou}
    bucket: ${COS_BUCKET:}
  sandbox-client:
    base-url: ${SANDBOX_URL:${SANDBOX_ADDRESS:http://localhost:8081}}
    connect-timeout-seconds: 10
    read-timeout-seconds: 300

  # 搜索配置（Bing API）
  search:
    api-key: ${SEARCH_API_KEY:}
    endpoint: https://api.bing.microsoft.com/v7.0/search
    max-results: 10

  # Agent 运行参数
  agent:
    max-iterations: 100
    max-retries: 3
    max-search-results: 10
    session-message-rate-per-minute: 20
    session-task-quota-per-day: 200
    session-active-task-limit: 1
    async-execution-enabled: true
    worker-poll-interval-ms: 1000
    dispatch-stream-key: manus:agent:dispatch
    dispatch-consumer-group: manus-agent-workers
    dispatch-claim-idle-ms: 30000
    dispatch-claim-batch-size: 10
    repeated-tool-call-threshold: 3

  # MCP 服务配置
  mcp:
    servers: {}

  # A2A 服务配置
  a2a:
    servers: []

# ==================== 日志 ====================
logging:
  level:
    com.imooc.manus: INFO
    org.springframework.ai: DEBUG
    root: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
