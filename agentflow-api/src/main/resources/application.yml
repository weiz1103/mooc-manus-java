spring:
  application:
    name: agentflow-api

  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:${AgentFlow_LLM_API_KEY:}}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:${AgentFlow_LLM_BASE_URL:https://api.deepseek.com}}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_MODEL:${AgentFlow_LLM_MODEL_NAME:deepseek-chat}}
          temperature: ${SPRING_AI_OPENAI_TEMPERATURE:${AgentFlow_LLM_TEMPERATURE:0.7}}
          max-tokens: ${SPRING_AI_OPENAI_MAX_TOKENS:${AgentFlow_LLM_MAX_TOKENS:8192}}

  # ==================== йҸҒзүҲеөҒжҗҙж’»еҺӨзјғ?====================
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/AgentFlow}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 20

  # ==================== Redis й–°е¶Үз–Ҷ ====================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8


# ==================== йҸҲе¶…е§ҹз»”оҲҡеҪӣй”ӣе қоҮ®жҗҙ?Python 8000й”ӣ?====================
server:
  port: ${SERVER_PORT:8000}

# ==================== жҗҙж—Ӯж•Өй‘·оҒ„з•ҫж¶”еӨҗеҺӨзјғ?====================
AgentFlow:
  llm:
    base-url: ${AgentFlow_LLM_BASE_URL:${SPRING_AI_OPENAI_BASE_URL:https://api.deepseek.com}}
    api-key: ${AgentFlow_LLM_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}
    model-name: ${AgentFlow_LLM_MODEL_NAME:${SPRING_AI_OPENAI_CHAT_MODEL:deepseek-chat}}
    temperature: ${AgentFlow_LLM_TEMPERATURE:${SPRING_AI_OPENAI_TEMPERATURE:0.7}}
    max-tokens: ${AgentFlow_LLM_MAX_TOKENS:${SPRING_AI_OPENAI_MAX_TOKENS:8192}}

  # еЁҢж¬‘оҶҲй–°е¶Үз–Ҷ
  sandbox:
    address: ${SANDBOX_ADDRESS:${SANDBOX_URL:http://localhost:8081}}
    image: ${SANDBOX_IMAGE:agentflow-sandbox:latest}
    name-prefix: agentflow-sandbox
    ttl-minutes: ${SANDBOX_TTL_MINUTES:60}
    network: ${SANDBOX_NETWORK:bridge}
    chrome-args: ${CHROME_ARGS:}
    https-proxy: ${HTTPS_PROXY:}
    http-proxy: ${HTTP_PROXY:}
    no-proxy: ${NO_PROXY:}
  # й‘өжҚҗоҶҶжөңж…ҚOSй–°е¶Үз–Ҷ
  cos:
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-guangzhou}
    bucket: ${COS_BUCKET:}
  sandbox-client:
    base-url: ${SANDBOX_URL:${SANDBOX_ADDRESS:http://localhost:8081}}
    connect-timeout-seconds: 10
    read-timeout-seconds: 300

  # йҺјж»…еӮЁй–°е¶Үз–Ҷй”ӣең”ing APIй”ӣ?
  search:
    api-key: ${SEARCH_API_KEY:}
    endpoint: https://api.bing.microsoft.com/v7.0/search
    max-results: 10

  # Agent жқ©ж„Ҝо”‘йҚҷеӮӣжҡҹ
  agent:
    max-iterations: 100
    max-retries: 3
    max-search-results: 10
    session-message-rate-per-minute: 20
    session-task-quota-per-day: 200
    session-active-task-limit: 1
    async-execution-enabled: true
    worker-poll-interval-ms: 1000
    dispatch-stream-key: AgentFlow:agent:dispatch
    dispatch-consumer-group: AgentFlow-agent-workers
    dispatch-claim-idle-ms: 30000
    dispatch-claim-batch-size: 10
    repeated-tool-call-threshold: 3

  # MCP йҸҲе¶…е§ҹй–°е¶Үз–Ҷ
  mcp:
    servers: {}

  # A2A йҸҲе¶…е§ҹй–°е¶Үз–Ҷ
  a2a:
    servers: []

# ==================== йҸғгғҘз№” ====================
logging:
  level:
    io.github.weiz1103.agentflow: INFO
    org.springframework.ai: DEBUG
    root: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"


